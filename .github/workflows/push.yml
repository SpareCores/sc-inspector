name: Build and publish sc-inspector

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sc_runner_version:
        description: Exact sparecores-runner PyPI version to install
        required: false
        type: string
        default: ""
      sc_runner_image_tag:
        description: sc-runner image tag for the base image (e.g. 0.0.63 or main)
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      sc_runner_version:
        description: Exact sparecores-runner PyPI version to install
        required: true
        type: string
      sc_runner_image_tag:
        description: sc-runner image tag for the base image (e.g. 0.0.63)
        required: true
        type: string
  repository_dispatch:
    types:
      - sc-runner-release

env:
  REGISTRY: ghcr.io
  # GHCR image paths must be lowercase; github.repository is SpareCores/sc-inspector.
  IMAGE_NAME: sparecores/sc-inspector
  # zstd layer compression for faster pulls on inspector VMs (Docker Engine ≥ 23.0).
  IMAGE_OUTPUT: type=registry,push=true,oci-mediatypes=true,compression=zstd,compression-level=7,force-compression=true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sc_runner_version: ${{ steps.resolve.outputs.sc_runner_version }}
      sc_runner_image_tag: ${{ steps.resolve.outputs.sc_runner_image_tag }}
      cache_suffix: ${{ steps.resolve.outputs.cache_suffix }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION='${{ github.event.client_payload.version }}'
            IMAGE_TAG='${{ github.event.client_payload.image_tag }}'
          else
            VERSION='${{ inputs.sc_runner_version }}'
            IMAGE_TAG='${{ inputs.sc_runner_image_tag }}'
          fi
          if [ -z "$IMAGE_TAG" ] && [ -n "$VERSION" ]; then
            IMAGE_TAG="${VERSION}"
          fi
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="main"
          fi
          echo "sc_runner_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sc_runner_image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "cache_suffix=-runner-${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "cache_suffix=-main" >> "$GITHUB_OUTPUT"
          fi
          echo "sc_runner_version=${VERSION:-<latest>}"
          echo "sc_runner_image_tag=${IMAGE_TAG}"

  build-and-push-image:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          repository: SpareCores/sc-inspector
          # workflow_call inherits the caller ref (e.g. a sc-runner tag); use main when inputs pin a runner version.
          ref: ${{ inputs.sc_runner_version != '' && 'main' || github.ref }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=false
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: ${{ env.IMAGE_OUTPUT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SC_RUNNER_IMAGE_TAG=${{ needs.resolve.outputs.sc_runner_image_tag }}
            SC_RUNNER_VERSION=${{ needs.resolve.outputs.sc_runner_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/sparecores/sc-inspector:buildcache-${{ matrix.arch }}${{ needs.resolve.outputs.cache_suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/sparecores/sc-inspector:buildcache-${{ matrix.arch }}${{ needs.resolve.outputs.cache_suffix }},mode=max

  merge-manifests:
    needs: [resolve, build-and-push-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Create multi-arch manifests
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --tag "$tag" \
              "$tag-amd64" \
              "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"
